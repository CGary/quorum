task_id: FEAT-000
type: feature                  # bugfix | refactor | feature | test | migration | doc
profile: standard              # light | standard | full
risk: medium                   # low | medium | high
complexity: atomic             # atomic | compound

goal: >
  One sentence describing what the agent must accomplish.

required_behavior:
  - "Behavior 1."
  - "Behavior 2."

acceptance:
  - "Criterion 1."
  - "Criterion 2."

verify:
  commands:
    - "your test command here"
    - "your lint command here"

read:
  - src/path/to/relevant/file.ts

touch:
  - src/path/to/feature/**
  - src/path/to/specific/file.ts

forbid:
  files:
    - package.json
    - "*.lock"
  behaviors:
    - "Do not introduce new runtime dependencies."
    - "Do not refactor unrelated code."

limits:
  max_files_changed: 6
  max_diff_lines: 300
  max_context_tokens: 20000
  max_tokens_per_file: 4000
  max_neighbor_hops: 1

execution:
  mode: patch_only             # patch_only | worktree_edit
  fallback_mode: worktree_edit
  max_attempts_per_mode: 2
  allow_new_files: true

retry_policy:
  level0_max_retries: 2
  level1_max_retries: 1
  level2_max_retries: 1
  stop_on_same_error_twice: true

review:
  required: true
  reason: "Describe why review is required."

human_gates:
  - before_merge
  # - after_plan               # only profile=full
  # - before_level2_escalation # recommended for high risk

promote_to_memory: false

# subtasks: []                 # only profile=full, generated by architect
