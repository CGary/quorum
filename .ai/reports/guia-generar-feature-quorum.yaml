content:
    kicker: Guía operativa validada con una corrida real end-to-end (RPT-007, 2026-07-23)
    sections:
        - diagram:
            code: |
                flowchart LR
                  B["/q-brief\n00-spec"] --> P["/q-blueprint\n01+02 + worktree"]
                  P --> A["/q-analyze\ncoherencia 00-02"]
                  A --> D{"implementar"}
                  D -->|delegado| F["/q-dispatch\nfleet: codex/agy/opencode"]
                  D -->|directo| I["/q-implement\nClaude"]
                  F --> V["/q-verify\nverify.commands"]
                  I --> V
                  V --> R["/q-review"]
                  R --> M["merge humano\n+ /q-memory + clean"]
            type: mermaid
          id: ciclo-lifecycle
          role: diagram
          title: Ciclo de vida de una feature
        - id: pasos
          items:
            - action: 'quorum init en el proyecto destino (una sola vez): crea .ai/tasks/, .agents/{skills,schemas,policies} y el symlink .claude/skills.'
              owner: humano
              step: 1
            - action: 'quorum task specify ID crea el esqueleto en inbox/; después /q-brief con la descripción: produce 00-spec.yaml (riesgo declarado por el humano, nunca lo pisa el scorer) y auto-ejecuta la transición inbox a active.'
              owner: humano + skill /q-brief
              step: 2
            - action: 'Opcional, solo si la feature es grande: /q-decompose escribe decomposition en el spec padre y auto-ejecuta quorum task split; cada hijo (ID-a, ID-b) corre su ciclo completo en su propio worktree y mergea independiente.'
              owner: skill /q-decompose
              step: 3
            - action: '/q-blueprint produce 01-blueprint.yaml y 02-contract.yaml (touch/forbid vinculantes, verify.commands baratos) y auto-ejecuta quorum task start: worktree en worktrees/ID sobre la rama ai/ID. Si el riesgo calculado diverge del declarado, registra ambos eventos en 07-trace sin reescribir tu spec.'
              owner: skill /q-blueprint
              step: 4
            - action: '/q-analyze (recomendado): audita coherencia entre 00-02 antes de gastar en implementar — acceptance criteria sin test_scenario, archivos fuera de touch, verify.commands lentos. Gaps reales se arreglan en blueprint; falsos gaps se declaran diferidos.'
              owner: skill /q-analyze
              step: 5
            - action: 'Implementación delegada: /q-dispatch ID rutea con quorum fleet route (riesgo x banda a nivel), muestra el candidato y espera tu confirmación antes de bundle+dispatch. Una tarea low/M va a nivel 1: codex gpt-5.5-medium primero, fallback $0 agy, secundarios gpt-5.6. IMPORTANTE tras attempt_done: el diff queda SIN commitear en el worktree — commitealo (commit convencional) antes de correr verify o su preflight bloquea.'
              owner: humano + skill /q-dispatch
              step: 6
            - action: 'Alternativa directa: /q-implement ID implementa con Claude dentro del contrato, sin fleet. Para greenfield, lógica novedosa, o cuando el fleet devolvió no_viable_candidate o attempt_failed.'
              owner: skill /q-implement
              step: 7
            - action: '/q-verify ID corre verify.commands en el worktree y persiste 05-validation.json. Obligatorio tras cualquier dispatch: done significa exit 0, la palabra del delegado no vale (Rule #4). Si falla, el loop de corrección vuelve a implement con el error como contexto.'
              owner: skill /q-verify
              step: 8
            - action: /q-review ID compara el diff contra spec/blueprint/contrato/validación (incluye quorum analyze contract-check) y emite approve, revise o reject en 06-review.json. Revise trae fix_tasks concretas; reject significa repensar el blueprint, no reintentar a fuerza bruta.
              owner: skill /q-review
              step: 9
            - action: '/q-accept agrega las compuertas (validación passed, review approve, contract-check ok, forbid intacto, trace sin violaciones) y emite ready/not_ready. Con ready: merge a main siempre humano (Rule #6), después /q-memory cura lo aprendido en SQLite y quorum task clean ID archiva a done/ y borra el worktree.'
              owner: humano + skills /q-accept /q-memory
              step: 10
          role: action_plan
          title: Paso a paso con comandos
        - body: 'En vez de invocar cada /q-* a mano, /q-orchestrate (skill global en ~/.claude/skills, fuera del perímetro constitucional del repo, permitido como andamiaje personal por D40) dirige el ciclo completo: desambigua contigo al inicio, delega cada fase a un subagente efímero y se detiene en el merge humano. La v1.4 (2026-07-23) suma tres piezas sobre el routing por dificultad: (1) puerta de fleet en implement — si riesgo low/medium y banda S/M con contrato claro, el orquestador corre /q-dispatch en la ventana principal (la confirmación humana no se delega) y el fleet externo implementa a costo ~cero, con fallback al subagente interno si el delegado falla; (2) grilla amplia de subagentes — cada función (especificador, ejecutor, revisor, arquitecto) existe en variantes modelo x esfuerzo (haiku a fable), con la tabla por dificultad como default y cualquier celda elegible anunciando la desviación; (3) ledger de mediciones en ~/.claude/quorum-agent-ledger.jsonl — una línea por fase (agente, modelo, outcome, reintentos) para que la selección de agente evolucione por evidencia, no por intuición. Estrenado con RPT-007: 8 fases medidas, todas verdes.'
          details:
            body: 'Todo candidato externo sale de quorum fleet route (política en config.yaml/routing.yaml/agents.yaml): el orquestador nunca elige modelo del fleet por su cuenta. La confirmación humana pre-dispatch nunca se relaja y codex jamás se despacha sin ella (créditos finitos). El revisor nunca es más débil que el implementador, también en celdas de la grilla. Un intento de fleet por implement, nunca ping-pong externo. Regla de fallo interno: una celda que falla se relanza UNA vez un paso arriba (modelo o esfuerzo), nunca en loop. Tras attempt_done el orquestador commitea el diff del delegado antes de verify (el sistema commitea, nunca mergea).'
            label: Reglas fijas del orquestador
          id: orquestacion-q-orchestrate
          role: analysis
          title: 'Modo orquestado: /q-orchestrate v1.4 dirige todo el ciclo'
        - body: 'Codex volvió a estar activo en .agents/fleet/agents.yaml con seis modelos free-tier nuevos mapeados (gpt-5.6-terra/luna en medium y high, gpt-5.4-mini en low y medium) además de los gpt-5.5 ya probados. El routing por niveles quedó así. Nivel 0 (riesgo low y banda S): células $0 de OpenRouter vía agy y opencode (gemini-3.5-flash-low primario, nemotron y laguna como reroute cross-provider); codex queda fuera a propósito para no quemar créditos finitos en trabajo rutinario. Nivel 1 (medium o banda M): primario codex gpt-5.5-medium, fallback agy gemini-3.1-pro-low, secundarios gpt-5.6-terra-medium y gpt-5.6-luna-medium. Nivel 2 (high o banda L, con gate humano): primario claude-opus-4-7, fallback codex gpt-5.5-high, secundarios gpt-5.6-terra-high y gpt-5.6-luna-high. Restricciones operativas de codex: es dispatch-only (quorum fleet run lo rechaza por diseño) y codex exec exige directorio git, condición que los worktrees cumplen. Evidencia real: su primer dispatch (RPT-007, nivel 1, low/M) produjo un diff de 4 archivos +269/-4 que pasó la suite completa y la revisión adversarial con cero fix_tasks.'
          details:
            body: 'Niveles y orden de transportes: .agents/config.yaml (levels + policies.fleet_transport_order = agy, opencode, aider, codex, claude). Matriz riesgo x banda a nivel: .agents/policies/routing.yaml. Transportes y modelos: .agents/fleet/agents.yaml. Contrato estructural de codex: .agents/fleet/contract_tests/codex.yaml (8 checks contra codex exec --help, sin gastar créditos). core.Route no hardcodea ningún modelo: todo es data de política, y cada decisión queda como evento routing_decision en 07-trace con snapshot de hashes.'
            label: Dónde vive cada decisión
          id: que-cambio-codex
          role: analysis
          title: Qué cambió con codex en el routing
        - id: delegar-o-directo
          items:
            - downside: Modelos más débiles que Claude en diseño; requiere reroute cuando un candidato falla; codex consume créditos finitos; el diff llega sin commitear.
              option: /q-dispatch (fleet delegado)
              upside: 'Costo cero o casi cero (células $0 de OpenRouter, créditos free de codex); el contrato acota el diff; trazabilidad forense completa en 07-trace. Probado: RPT-007 salió approve a la primera.'
              useWhen: 'Tareas cerradas con contrato claro y verify.commands baratos: nivel 0 rutinario o nivel 1 bien especificado.'
            - downside: Gasta tokens del hilo principal de Claude; sin diversidad de familia para la revisión posterior.
              option: /q-implement (Claude directo)
              upside: Máxima calidad de juicio; sin límites de cuota externa; ideal cuando el blueprint deja decisiones abiertas.
              useWhen: Greenfield, lógica novedosa, o cuando el fleet devolvió no_viable_candidate o attempt_failed.
            - avoidWhen: Cualquier cambio que toque más de un archivo o requiera juicio de diseño.
              downside: Poco fiable en dificultad M (0/10 en tareas de dos archivos); la guardia de /q-dispatch lo rechaza si touch tiene más de un archivo.
              option: aider (dentro del fleet)
              upside: Harness de edición muy fiable en cambios mecánicos de un solo archivo (9/10 en campaña pass@10).
          role: tradeoffs
          title: Delegar al fleet o implementar directo
        - body: 'Los créditos free-tier de ChatGPT se tratan como un tanque que solo baja (asunción conservadora registrada en agents.yaml): prefiere los transportes $0 (agy/opencode, cuya cuota diaria se resetea sola) para lo rutinario y reserva codex para dispatches deliberados de nivel 1-2. /q-dispatch exige confirmación humana antes de cada dispatch, así que codex nunca gasta solo; si la cuota se agota a mitad de un dispatch, la failure_signature dispara reroute automático al fallback $0. Límites OpenRouter free-tier: 20 req/min compartidas, 1000 req/día, y los 429 cuentan contra la cuota diaria — nunca reintentar en loop.'
          id: cuidado-creditos
          kind: warning
          role: callout
          title: 'Créditos codex: finitos y nunca gastados en silencio'
        - id: verificacion
          items:
            - check: quorum fleet --help y quorum report --help; recompilar con go build -o ~/go/bin/quorum . si falta algo
              what: Que el binario global tenga los comandos nuevos (fleet route, report list)
              why: El binario local ./quorum del repo puede estar desactualizado respecto al global del PATH — pasó en la corrida real y confunde al diagnosticar
            - check: 'git -C worktrees/ID status --porcelain; si hay cambios: git -C worktrees/ID add -A && git commit'
              what: Que el worktree esté limpio después de un dispatch attempt_done
              why: quorum fleet dispatch aplica el diff pero NO commitea; el preflight de /q-verify bloquea con worktree sucio
            - check: quorum validate .ai/tasks/active/ID-slug/00-spec.yaml (o el artefacto que toque), siempre desde la raíz del repo
              what: Que los artefactos validen antes de persistir a mano
              why: SaveArtifact valida contra schema antes de escribir; un YAML inválido no se persiste y el error field=...; reason=... dice exactamente dónde
          role: verification
          title: Chequeos rápidos antes de confiar
        - body: 'Estado y navegación: quorum task list, quorum task status ID, /q-status. Reportes: quorum report new/save/list (list muestra id, kind, título y fecha; con --json para consumo programático — feature RPT-007 de esta misma guía) y /q-report para redactarlos; visor web con quorum serve. Memoria curada: /q-memory por tarea, /q-session para cierre de sesión (source_task SESSION-*); entradas tipadas pattern/decision/lesson con supersedes causal, nunca se borran. Validación local sin mutar estado: quorum validate ruta/al/artefacto. Persistencia validada: quorum task artifact-save ID relpath (siempre desde la raíz del repo). Rollback humano: quorum task back ID (borra worktree y rama sin commits únicos; nunca lo ejecuta una skill). Retry de hijo fallido: quorum task retry-prepare CHILD_ID (humano u orquestador, preserva 07-trace append-only). Feedback: quorum analyze feedback-partition separa hallazgos mecánicos de semánticos; quorum task feedback-consume ID al consumirlos. Runner standalone sin lifecycle: quorum fleet run --agent agy|opencode|aider --schema (codex no es invocable por run, solo por dispatch). Dashboard read-only del fleet: /fleet en quorum serve, kill-switch en /api/fleet/toggle. Los tres únicos auto-encadenamientos autorizados siguen siendo brief a blueprint, decompose a split y blueprint a start; todo lo demás lo despacha el humano u orquestador fase por fase (Rule #9).'
          id: referencia
          role: appendix
          title: Referencia rápida de comandos y rollback
    summary: 'El ciclo Spec-Driven Contracts no cambió: una feature nace como intención humana y termina como diff verificado en Git, pasando por artefactos validados 00-07. Lo nuevo es la capa de ejecución: el transporte codex fue reactivado con modelos free-tier (gpt-5.5, gpt-5.6-terra/luna, gpt-5.4-mini) y ruteado en los niveles 1-2 del fleet, y el orquestador personal /q-orchestrate llegó a v1.4 con puerta de fleet, grilla amplia de subagentes y ledger de mediciones. Esta guía ya no es teoría: el ciclo completo se estrenó con la feature RPT-007 (quorum report list), implementada por codex en su primer dispatch real, verificada, aprobada y mergeada a main.'
    title: Cómo generar una feature con Quorum hoy (fleet con codex activo)
    verdict:
        confidence: high
        text: 'Para generar una feature hoy hay dos modos: fase por fase (/q-brief, /q-blueprint, /q-analyze, /q-dispatch o /q-implement, /q-verify, /q-review, merge humano, /q-memory) o dirigido por /q-orchestrate v1.4, que delega cada fase a subagentes de una grilla medida por ledger y prefiere el fleet externo ($0 y codex free-tier) en implement cuando riesgo y banda lo permiten. Probado end-to-end: RPT-007 salió verde con codex como implementador.'
kind: project_usage
