# Routing rules: one ceremony level for complex-feature tasks.
# Cost, retries, and escalation are dispatcher-controlled, not agent-controlled.
rules:
  - match: {risk: low}
    executor_level: 0
    reviewer_required: true
    max_attempts: 2

  - match: {risk: medium}
    executor_level: 0
    reviewer_required: true
    max_attempts: 2

  - match: {risk: high}
    executor_level: 0
    reviewer_required: true
    max_attempts: 1
    human_gate_required: true

type_overrides:
  migration:
    reviewer_required: true
    human_gate_required: true
  security:
    reviewer_required: true
    human_gate_required: true

routes:
  default: [context, executor_L0, verify, reviewer_L1, before_merge]
