levels:
  0:
    use_for:
      - feature_execution
      - tests
      - docs
      - mechanical_refactor
    primary: google/gemini-3.5-flash-low
    # G1-ratified: reroute is always cross-provider free-to-agy. core.Route
    # enumerates primary, then fallback, then secondary[...] in that fixed
    # order (internal/core/fleet_route.go enumerateCandidates) -- so the
    # FIRST reroute candidate after primary is excluded MUST be a
    # cross-provider (opencode-backed, $0 OpenRouter free tier) cell, never
    # another agy-provided model. fallback therefore holds the cross-provider
    # secondary; the agy-provided openai/gpt-oss-120b fallback moves into
    # secondary, reached only after both cross-provider cells are excluded.
    fallback: nvidia/nemotron-3-ultra-550b-a55b-free
    secondary:
      - poolside/laguna-m.1-free
      - openai/gpt-oss-120b
    # max_cost_per_call_usd only binds transports with quota_class: api (ADR-A).
    max_cost_per_call_usd: 0.15

  1:
    use_for:
      - review
      - diagnose_verify_failure
      - small_corrections
    primary: openai/gpt-5.5-medium
    fallback: google/gemini-3.1-pro-low
    # gpt-5.6 free-tier cells (2026-07-22): listed in the order the human gave
    # them; no capability ranking between terra and luna is asserted. They sit
    # in secondary so the proven gpt-5.5-medium primary and the $0 agy fallback
    # are enumerated first — codex free credits are finite.
    secondary:
      - openai/gpt-5.6-terra-medium
      - openai/gpt-5.6-luna-medium
    max_cost_per_call_usd: 0.50

  2:
    use_for:
      - surgical_cartography
      - high_risk_arch
      - ambiguous_features
      - migrations
      - security
    primary: anthropic/claude-opus-4-7
    fallback: openai/gpt-5.5-high
    # Same ordering rationale as level 1: human-given order, no ranking claim.
    secondary:
      - openai/gpt-5.6-terra-high
      - openai/gpt-5.6-luna-high
    max_cost_per_call_usd: 3.00
    requires_human_gate: true

policies:
  max_attempts_default: 2
  cost_bounded_by_dispatcher: true
  system_commits: true
  human_merges: true
  # Deterministic transport preference order consumed by `quorum fleet route`
  # when building the ordered candidate transport slice. Expresses the
  # cross-provider reroute preference as DATA (not Go): agy first (primary cheap
  # cell's own transport), opencode before aider (cross-provider before the
  # mechanical-single-file fallback), then codex (reactivated 2026-07-22 on
  # finite free-tier credits) and claude (inactive) last.
  # A transport absent from this list is unreachable via `fleet route`.
  fleet_transport_order:
    - agy
    - opencode
    - aider
    - codex
    - claude
