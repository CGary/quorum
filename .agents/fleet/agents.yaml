# Fleet transports (ADR 0010): describes ONLY how to invoke each CLI.
# Never add tier/level/risk/confidence/budget fields here — that policy lives
# exclusively in .agents/config.yaml.levels and .agents/policies/routing.yaml.
# Canonical model names use the provider/model form and join config.yaml.levels
# by exact string match (ADR 0010 section 2). The reasoning-effort suffix is
# provisional; validated per-model against effort_whitelist, never a global enum.
transports:
  codex:
    # exec subcommand, config-isolated so it never inherits the interactive
    # user's ~/.codex/config.toml model/effort/MCP config (Fase 0a §8.2).
    binary: codex
    argv_template:
      - exec
      - --ephemeral
      - --ignore-user-config
      - -m
      - "{model_arg}"
      - -c
      - "model_reasoning_effort={reasoning_effort}"
      - -C
      - "{worktree}"
      - --sandbox
      - workspace-write
      - --json
      - -o
      - "{out}"
    input_channel: stdin
    output_format: jsonl
    timeouts:
      # No CLI-native timeout was observed in Fase 0a (successful run: 115s).
      # Provisional wrapper default with margin; not an inventory-verified value.
      default_s: 600
    sandbox: workspace-write
    failure_signatures:
      # Verified in Fase 0a §2: rejection when the pinned model is unavailable
      # for the account's ChatGPT tier (attempt 1, ADR 0010 context).
      - model not supported when using Codex with a ChatGPT account
    quota_class: subscription
    models:
      # provider is a closed-enum field (agents.schema.json): one of google,
      # openrouter-nvidia, openrouter-poolside, openrouter-cohere, anthropic,
      # openai. `quorum fleet route` reads it as ModelAvailability.Family
      # (internal/core/fleet_route.go) -- a soft review-family diversity
      # signal only, never a hard filter: when no candidate of a different
      # family survives control/exclusion filtering, Route() still returns a
      # candidate and marks ReviewFamilyDegraded instead of blocking.
      # gpt-5.5 whitelist per Fase 0a §9: {none, low, medium, high, xhigh}.
      # minimal is syntactically valid globally but rejected by this backend;
      # there is no "max" — the former config.toml "max" was exactly this bug.
      openai/gpt-5.5-none:
        provider: openai
        model_arg: gpt-5.5
        reasoning_effort: none
        effort_whitelist: [none, low, medium, high, xhigh]
      openai/gpt-5.5-low:
        provider: openai
        model_arg: gpt-5.5
        reasoning_effort: low
        effort_whitelist: [none, low, medium, high, xhigh]
      openai/gpt-5.5-medium:
        provider: openai
        model_arg: gpt-5.5
        reasoning_effort: medium
        effort_whitelist: [none, low, medium, high, xhigh]
      openai/gpt-5.5-high:
        provider: openai
        model_arg: gpt-5.5
        reasoning_effort: high
        effort_whitelist: [none, low, medium, high, xhigh]
      openai/gpt-5.5-xhigh:
        provider: openai
        model_arg: gpt-5.5
        reasoning_effort: xhigh
        effort_whitelist: [none, low, medium, high, xhigh]
      # gpt-5.6-sol intentionally absent: temporarily unavailable, not obsolete
      # (Fase 0a §9 addendum). Reintroducing it only requires editing this map.
      # Free-tier models below confirmed available by the human 2026-07-22
      # (gpt-5.6-terra, gpt-5.6-luna, gpt-5.4-mini). Their effort_whitelist is
      # ASSUMED equal to gpt-5.5's backend enum, not per-model verified: only
      # gpt-5.4-mini-low was smoke-probed (credits are scarce). Extending the
      # effort variants only requires editing this map.
      openai/gpt-5.6-terra-medium:
        provider: openai
        model_arg: gpt-5.6-terra
        reasoning_effort: medium
        effort_whitelist: [none, low, medium, high, xhigh]
      openai/gpt-5.6-terra-high:
        provider: openai
        model_arg: gpt-5.6-terra
        reasoning_effort: high
        effort_whitelist: [none, low, medium, high, xhigh]
      openai/gpt-5.6-luna-medium:
        provider: openai
        model_arg: gpt-5.6-luna
        reasoning_effort: medium
        effort_whitelist: [none, low, medium, high, xhigh]
      openai/gpt-5.6-luna-high:
        provider: openai
        model_arg: gpt-5.6-luna
        reasoning_effort: high
        effort_whitelist: [none, low, medium, high, xhigh]
      openai/gpt-5.4-mini-low:
        provider: openai
        model_arg: gpt-5.4-mini
        reasoning_effort: low
        effort_whitelist: [none, low, medium, high, xhigh]
      openai/gpt-5.4-mini-medium:
        provider: openai
        model_arg: gpt-5.4-mini
        reasoning_effort: medium
        effort_whitelist: [none, low, medium, high, xhigh]
    contract_test: .agents/fleet/contract_tests/codex.yaml
    # Reactivated 2026-07-22: ChatGPT free-tier credits are available for
    # gpt-5.6-terra / gpt-5.6-luna / gpt-5.5 / gpt-5.4-mini. Credits are
    # LIMITED and non-renewing: prefer the $0 transports (agy/opencode) for
    # routine dispatches and keep real codex runs scarce and deliberate.
    active: true

  agy:
    # No -C/--cd flag exists for agy (Fase 0a §3): the wrapper MUST launch
    # this process with cwd=worktree instead of passing a directory flag.
    # --print/-p is a greedy Go-style string flag: it MUST be the last argv
    # token, or the next flag is swallowed as the prompt (false-success trap,
    # Fase 0a §8.1). All other flags go first.
    binary: agy
    # {print_timeout} carries the SAME effective timeout_s used for the
    # wrapper's hard-kill at each call site (dispatch/run/smoke), formatted as
    # a Go duration string (FLEET-019); it is no longer a fixed 5m0s literal.
    argv_template:
      - --model
      - "{model_arg}"
      - --print-timeout
      - "{print_timeout}"
      - --print
      - "{prompt}"
    # prompt_pointer (FLEET-024): agy has no stdin/file-prompt support and
    # rejects an empty --print argument, so the argv still carries a {prompt}
    # token, but the wrapper now renders it as a small fixed instruction that
    # points at the dispatch bundle's absolute on-disk path instead of the
    # raw (possibly >128 KiB) prompt content, avoiding fork/exec E2BIG.
    input_channel: prompt_pointer
    output_format: text
    timeouts:
      # agy's own documented default for --print-timeout (Fase 0a §3).
      default_s: 300
    failure_signatures: []
    quota_class: subscription
    models:
      # Exact strings from `agy models` (Fase 0a §3), joined by canonical
      # provider/model name. GPT-OSS 120B only ships a single effort tier.
      google/gemini-3.5-flash-low:
        provider: google
        model_arg: Gemini 3.5 Flash (Low)
      google/gemini-3.5-flash-medium:
        provider: google
        model_arg: Gemini 3.5 Flash (Medium)
      google/gemini-3.5-flash-high:
        provider: google
        model_arg: Gemini 3.5 Flash (High)
      google/gemini-3.1-pro-low:
        provider: google
        model_arg: Gemini 3.1 Pro (Low)
      google/gemini-3.1-pro-high:
        provider: google
        model_arg: Gemini 3.1 Pro (High)
      openai/gpt-oss-120b:
        provider: openai
        model_arg: GPT-OSS 120B (Medium)
      # Anthropic Claude 4.6, single-tier "(Thinking)" (no low/medium/high),
      # so the canonical key carries no effort suffix and the entry declares
      # only model_arg (openai/gpt-oss-120b single-tier precedent). Hyphen form
      # matches the sole existing Anthropic canonical name
      # (config.yaml.levels[2].primary = anthropic/claude-opus-4-7). Exposed to
      # 'quorum fleet run'; not routed by any config.yaml level (ADR 0010 §5).
      anthropic/claude-sonnet-4-6:
        provider: anthropic
        model_arg: Claude Sonnet 4.6 (Thinking)
      anthropic/claude-opus-4-6:
        provider: anthropic
        model_arg: Claude Opus 4.6 (Thinking)
    contract_test: .agents/fleet/contract_tests/agy.yaml
    active: true

  aider:
    # Operational intent (NOT enforced by core.Route): aider is de-prioritized
    # to the last cross-provider reroute fallback (see config.yaml
    # policies.fleet_transport_order) and should be used only for MECHANICAL
    # SINGLE-FILE changes; a 2026-07-16 M-difficulty campaign found it
    # unreliable on multi-file tasks (docs/fleet-run-for-agents.md 7.2/4.1).
    # Wired transport (FLEET-017; ideas/fleet/17-adapter-aider.md). First
    # quota_class:api transport, backed by OpenRouter's free auto-router.
    # aider auto-commits by default -- the wrapper neutralizes that (and any
    # attribution/lint/test side effects) so q-verify remains the sole
    # validation truth (Rule 4 / D15) and the forensic-ref/reset invariant
    # (task 06) stays intact.
    binary: aider
    argv_template:
      - --message-file
      - "{prompt_file}"
      - --no-auto-commits
      - --no-attribute-co-authored-by
      - --no-attribute-author
      - --no-attribute-committer
      - --no-dirty-commits
      # --no-gitignore stops aider's default first-run edit of .gitignore
      # (it auto-adds ".aider*", auto-accepted by --yes-always), which lands
      # outside the contract touch list (live dispatch finding, 2026-07-15).
      - --no-gitignore
      - --no-auto-lint
      - --no-auto-test
      - --yes-always
      - --model
      - "{model_arg}"
      - "{files}"
    input_channel: prompt_file
    output_format: text
    timeouts:
      # Provisional: no aider-native default documented by the Fase 0a
      # mini-inventory (sondeo only, no LLM execution). Open item for the
      # doc 17 adapter task.
      default_s: 600
    failure_signatures: []
    quota_class: api
    models:
      # Pinned OpenRouter free-tier models -- the same six validated entries
      # as the opencode transport (evidence + methodology:
      # docs/fleet-run-for-agents.md section 7). Canonical keys substitute
      # "-free" for OpenRouter's ":free" suffix (agents.schema.json key
      # pattern forbids ":"); aider reaches OpenRouter through litellm, so
      # every model_arg carries the "openrouter/" provider prefix in front of
      # the literal OpenRouter model ID (colon preserved). The openrouter/free
      # auto-router was REMOVED from this transport on 2026-07-15 (ratified):
      # aider cells are pinned-only; the auto-router availability fallback
      # lives on the opencode transport. Note: the six were validated via
      # opencode (agentic) and single-shot codegen; aider-specific pass rates
      # are pending their own validation round.
      nvidia/nemotron-3-ultra-550b-a55b-free:
        provider: openrouter-nvidia
        model_arg: openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
        max_cost_per_call_usd: 0.5
      nvidia/nemotron-3-nano-omni-30b-a3b-reasoning-free:
        provider: openrouter-nvidia
        model_arg: openrouter/nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free
        max_cost_per_call_usd: 0.5
      poolside/laguna-xs-2.1-free:
        provider: openrouter-poolside
        model_arg: openrouter/poolside/laguna-xs-2.1:free
        max_cost_per_call_usd: 0.5
      cohere/north-mini-code-free:
        provider: openrouter-cohere
        model_arg: openrouter/cohere/north-mini-code:free
        max_cost_per_call_usd: 0.5
      poolside/laguna-m.1-free:
        provider: openrouter-poolside
        model_arg: openrouter/poolside/laguna-m.1:free
        max_cost_per_call_usd: 0.5
      # Slowest cell (32-154s/call) but measured 9/10 via real dispatch
      # (pass@10 campaign 2026-07-15). aider-only: removed from the opencode
      # transport, where its agentic tool-use scored 3/10.
      nvidia/nemotron-nano-9b-v2-free:
        provider: openrouter-nvidia
        model_arg: openrouter/nvidia/nemotron-nano-9b-v2:free
        max_cost_per_call_usd: 0.5
    contract_test: .agents/fleet/contract_tests/aider.yaml
    active: true

  opencode:
    # Wired transport (FLEET-020). Implement-only, mirrors the aider adapter
    # pattern (FLEET-017): backed by OpenRouter's free auto-router, so this is
    # a second quota_class:api transport. Unlike aider, opencode gets its own
    # {cwd} agentic-directory flag (--dir) instead of a {prompt_file}, and its
    # prompt is passed inline as a trailing argv token (input_channel:
    # prompt_arg) with stdin explicitly closed (stdin_empty) rather than piped.
    binary: opencode
    # OPENCODE_DISABLE_AUTOUPDATE=true avoids the documented network
    # auto-update hang in headless/non-interactive runs (GH #9954/#3503); it is
    # always set for this transport, never conditionally.
    env:
      OPENCODE_DISABLE_AUTOUPDATE: "true"
    argv_template:
      - run
      - -m
      - "{model_arg}"
      - --format
      - json
      - --dir
      - "{cwd}"
      - --auto
    # stdin (FLEET-024): opencode reads the prompt from stdin when no
    # positional message argv token is given, so the prompt no longer travels
    # inline through argv (which previously hit fork/exec E2BIG on bundles
    # larger than Linux's MAX_ARG_STRLEN, 128 KiB).
    input_channel: stdin
    output_format: json
    timeouts:
      # Provisional: no opencode-native default was empirically measured this
      # session; validate via `quorum fleet smoke opencode <task_id>` before
      # trusting a real dispatch.
      default_s: 300
    failure_signatures: []
    quota_class: api
    models:
      # Canonical key matches aider's own openrouter/free entry: the
      # agents.schema.json models propertyNames pattern
      # ("^[a-z0-9_.-]+/[a-z0-9_.-]+$") allows exactly one "/", so the
      # doubled "openrouter/openrouter/free" string can only ever be the
      # model_arg value opencode's own --model flag expects, never the
      # canonical key. 00-spec.yaml's AC-2 example uses the doubled string
      # loosely; the schema-valid canonical name is this shorter
      # "openrouter/free", consistent with the blueprint's AC-1 statement and
      # the aider precedent (FLEET-017).
      openrouter/free:
        # openrouter-nvidia is the least-wrong bucket: this is OpenRouter's
        # cross-provider auto-router (FLEET-020), not a single-provider model.
        provider: openrouter-nvidia
        model_arg: openrouter/openrouter/free
      # Validated agentic 2026-07-15 (empirical OpenRouter free-model
      # evaluation, docs/fleet-run-for-agents.md section 7): hidden,
      # independent 9-case Go test suite the model never saw, single-shot
      # codegen PASS 9/9 in 3.8s, then the SAME grading driven through
      # opencode's own tool-use loop PASS 9/9 in 18s -- one of six free
      # models in that evaluation validated end-to-end for agentic use (the
      # other five are grouped below with a shared note). No
      # expiration_date at validation time, but free-tier models decay
      # (saturation/removal) without notice -- re-check expiration_date and
      # re-probe latency before relying on this entry (see docs section 7.7).
      # Canonical key swaps the OpenRouter ":free" suffix for "-free":
      # agents.schema.json's models propertyNames pattern
      # ("^[a-z0-9_.-]+/[a-z0-9_.-]+$") allows exactly one "/" but excludes
      # ":" from its character class, so the raw OpenRouter model id
      # "nvidia/nemotron-3-ultra-550b-a55b:free" cannot be used verbatim as a
      # map key (same doubled-string precedent as openrouter/free above:
      # model_arg carries the exact, colon-preserving string opencode's -m
      # flag needs; the canonical key only has to be schema-valid).
      nvidia/nemotron-3-ultra-550b-a55b-free:
        provider: openrouter-nvidia
        model_arg: openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
      # The five entries below were validated agentic 2026-07-15 in the same
      # evaluation (hidden 9-case test via opencode tool-use loop, PASS 9/9
      # each; see docs/fleet-run-for-agents.md section 7). Same ":free" ->
      # "-free" canonical-key transform documented on the ultra entry above;
      # re-validate periodically (docs section 7.7). Ordered by measured
      # agentic speed (11s / 12s / 14s / 19s / 72s).
      nvidia/nemotron-3-nano-omni-30b-a3b-reasoning-free:
        provider: openrouter-nvidia
        model_arg: openrouter/nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free
      poolside/laguna-xs-2.1-free:
        provider: openrouter-poolside
        model_arg: openrouter/poolside/laguna-xs-2.1:free
      cohere/north-mini-code-free:
        provider: openrouter-cohere
        model_arg: openrouter/cohere/north-mini-code:free
      poolside/laguna-m.1-free:
        provider: openrouter-poolside
        model_arg: openrouter/poolside/laguna-m.1:free
    contract_test: .agents/fleet/contract_tests/opencode.yaml
    active: true

  claude:
    # Inactive in v1 (ADR 0010 section 5). No level routes to this transport:
    # the "Claude frontier" referenced by config.yaml.levels[2].primary is the
    # human orchestrator session itself, not this CLI. Declared for symmetry
    # and future activation only.
    binary: claude
    argv_template:
      - -p
      - --model
      - "{model_arg}"
      - --output-format
      - json
    input_channel: stdin
    output_format: json
    timeouts:
      default_s: 300
    failure_signatures: []
    quota_class: subscription
    models: {}
    contract_test: .agents/fleet/contract_tests/claude.yaml
    active: false
