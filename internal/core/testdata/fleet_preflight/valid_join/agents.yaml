transports:
  codex:
    binary: codex
    argv_template:
      - --json
    input_channel: stdin
    output_format: jsonl
    timeouts:
      default_s: 120
    quota_class: subscription
    models:
      openai/gpt-5.5-medium:
        model_arg: gpt-5.5
        reasoning_effort: medium
    contract_test: contracts/codex.yaml
    active: true
  agy:
    binary: agy
    argv_template:
      - --print
    input_channel: prompt_arg
    output_format: text
    timeouts:
      default_s: 90
    quota_class: subscription
    models:
      google/gemini-3.5-flash-low:
        model_arg: gemini-3.5-flash
    contract_test: contracts/agy.yaml
    active: true
