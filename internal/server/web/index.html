<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quorum Cognitive Reports</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                <h1>Quorum</h1>
            </div>
            
            <div class="nav-section">
                <h2>Projects</h2>
                <select id="project-select" aria-label="Select Project">
                    <option value="" disabled selected>Select a project...</option>
                </select>
            </div>

            <div class="nav-section nav-section-flex">
                <div class="view-tabs" role="tablist" aria-label="Project data">
                    <button id="reports-tab" class="view-tab active" type="button" role="tab" aria-selected="true">Reports</button>
                    <button id="memories-tab" class="view-tab" type="button" role="tab" aria-selected="false">Memories</button>
                    <button id="tasks-tab" class="view-tab" type="button" role="tab" aria-selected="false">Tasks</button>
                </div>
                <div id="memory-controls" class="memory-controls hidden">
                    <select id="memory-type" aria-label="Filter memory type">
                        <option value="">All types</option>
                        <option value="decision">Decision</option>
                        <option value="pattern">Pattern</option>
                        <option value="lesson">Lesson</option>
                    </select>
                    <input id="memory-search" type="search" placeholder="Search curated memory..." aria-label="Search memories">
                </div>
                <div id="task-controls" class="memory-controls hidden">
                    <select id="task-location" aria-label="Filter task location">
                        <option value="">All locations</option>
                        <option value="inbox">Inbox</option>
                        <option value="active">Active</option>
                        <option value="done">Done</option>
                        <option value="failed">Failed</option>
                    </select>
                    <input id="task-search" type="search" placeholder="Search tasks..." aria-label="Search tasks">
                </div>
                <div id="report-list" class="report-list">
                    <div class="empty-state">Select a project to view reports</div>
                </div>
                <div id="memory-list" class="report-list hidden">
                    <div class="empty-state">Select a project to view memories</div>
                </div>
                <div id="task-list" class="report-list hidden">
                    <div class="empty-state">Select a project to view tasks</div>
                </div>
            </div>
        </aside>

        <main class="content">
            <header class="content-header">
                <h2 id="report-title">No Report Selected</h2>
                <span id="report-date" class="badge"></span>
            </header>
            
            <div id="report-content" class="report-content">
                <div class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    <p>Select a report from the sidebar to view its contents.</p>
                </div>
            </div>
        </main>
    </div>
    <script src="mermaid.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
